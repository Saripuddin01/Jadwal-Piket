<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Piket Marbot Masjid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 650px; margin: auto; background-color: #f0f7f4; }
        .container { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #2e7d32; position: relative;}
        h2 { text-align: center; color: #1b5e20; margin-bottom: 5px; font-size: 22px; }
        .subtitle { text-align: center; color: #555; font-size: 16px; margin-top: 0; margin-bottom: 20px; font-weight: bold; }
        .tanggal-cetak { text-align: center; color: #777; font-size: 14px; margin-bottom: 20px; display: none; }
        
        .menu-pilihan { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; background-color: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; }
        select { padding: 8px 12px; font-size: 16px; border-radius: 4px; border: 1px solid #2e7d32; cursor: pointer; font-weight: bold; }
        
        .flex-table { width: 100%; border-top: 1px solid #ddd; border-left: 1px solid #ddd; border-right: 1px solid #ddd; margin-top: 10px; border-radius: 4px 4px 0 0; overflow: hidden; }
        .flex-row { display: flex; width: 100%; border-bottom: 1px solid #ddd; box-sizing: border-box; }
        .flex-header { background-color: #2e7d32; color: white; font-weight: bold; }
        .flex-cell { flex: 1; width: 50%; padding: 12px; display: flex; flex-direction: column; box-sizing: border-box; word-wrap: break-word; }
        .flex-cell:first-child { border-right: 1px solid #ddd; }
        .label-piket { margin-bottom: 8px; font-size: 15px; color: #1b5e20; }
        
        .input-nama, .input-tugas { width: 100%; flex-grow: 1; min-height: 30px; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: #fafafa; resize: none; font-family: inherit; }
        .input-nama { text-align: center; font-weight: bold; }
        .input-tugas { text-align: left; }
        .input-nama:focus, .input-tugas:focus { outline: none; border-color: #2e7d32; background-color: #fff; }

        .grup-tombol { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        button { padding: 14px 15px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-rotate { background-color: #4CAF50; }
        .btn-rotate:hover { background-color: #388E3C; }
        .btn-wa { background-color: #25D366; }
        .btn-wa:hover { background-color: #1ebe57; }
        
        .nama-teks { font-size: 16px; padding: 10px 0; display: block; font-weight: bold; text-align: center; line-height: 1.5; }
        .tugas-teks { font-size: 14px; text-align: left; }
        .tugas-teks ul { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>

    <div class="container" id="areaCetak">
        <h2>🕌 Jadwal Piket Harian Marbot</h2>
        <p class="subtitle">Masjid Mushab bin Umair FT UNM</p>
        <p class="tanggal-cetak" id="tanggalCetak"></p>
        
        <div class="menu-pilihan" id="areaMenu">
            <label for="pilihJumlah"><strong>Jumlah Marbot:</strong></label>
            <select id="pilihJumlah" onchange="sesuaikanJumlah()">
                <option value="3">3 Orang</option>
                <option value="4">4 Orang</option>
                <option value="5">5 Orang</option>
                <option value="6">6 Orang</option>
                <option value="7">7 Orang</option>
                <option value="8">8 Orang</option>
            </select>
        </div>

        <div class="flex-table">
            <div class="flex-row flex-header">
                <div class="flex-cell" style="text-align: center; justify-content: center; align-items: center;">Rincian Tugas</div>
                <div class="flex-cell" style="text-align: center; justify-content: center; align-items: center;">Nama Marbot</div>
            </div>
            <div id="tabelPiket">
                </div>
        </div>

        <div class="grup-tombol" id="areaTombol">
            <button class="btn-rotate" onclick="putarGiliran()">Putar Giliran Piket Selanjutnya &raquo;</button>
            <button class="btn-wa" onclick="bagikanKeWA()">&#128247; Bagikan ke WA (Gambar)</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwdbFm2pkzTLRxrtKAqlk3xcwTPF9QQqIHg8C8eGGS7ufHJVJ3DJ2L6lRT-6yrYWDEA6A/exec";
        let daftarPiket = [];
        let daftarTugas = [];

        // Data Default (Jika Database kosong)
        const defaultPiket = ["K. Muhlis", "Munir", "K. Syarif", "K. Fahril", "K. Anis", "K. Rizky", "Handika"];
        const defaultTugas = [
            "Sapu dan Pel saf Ikhwan\nBersihkan Mimbar", "Sapu dan Pel saf akhwat\nWC akhwat", "Sapu dan Pel teras",
            "Halaman Masjid Selatan\nBersihkan dapur", "Halaman Masjid Utara", "Masak\nWc Ikhwan", "Cupir Pagi & Sore", "Tugas Tambahan / Bebas"
        ];

        // 1. Fungsi Mengambil Data dari Google Sheets saat Web Dibuka
        async function ambilDataDariDatabase() {
            try {
                const respons = await fetch(API_URL);
                const data = await respons.json();
                
                if (data.nama && data.tugas) {
                    daftarPiket = data.nama;
                    daftarTugas = data.tugas;
                } else {
                    daftarPiket = [...defaultPiket];
                    daftarTugas = [...defaultTugas];
                }
                perbaruiTampilan();
            } catch (error) {
                console.error("Gagal ambil data:", error);
                // Jika gagal internet, pakai memori lokal sebagai cadangan
                daftarPiket = JSON.parse(localStorage.getItem("dataPiketMarbot")) || [...defaultPiket];
                daftarTugas = JSON.parse(localStorage.getItem("dataTugasMarbot")) || [...defaultTugas];
                perbaruiTampilan();
            }
        }

        // 2. Fungsi Menyimpan Data ke Google Sheets (Diam-diam di background)
        let timerSimpan;
        function simpanKeDatabase() {
            // Simpan ke local storage juga sebagai backup
            localStorage.setItem("dataPiketMarbot", JSON.stringify(daftarPiket));
            localStorage.setItem("dataTugasMarbot", JSON.stringify(daftarTugas));
            
            clearTimeout(timerSimpan);
            timerSimpan = setTimeout(async () => {
                try {
                    await fetch(API_URL, {
                        redirect: "follow", 
                        method: 'POST',
                        headers: {
                            "Content-Type": "text/plain;charset=utf-8", 
                        },
                        body: JSON.stringify({ nama: daftarPiket, tugas: daftarTugas })
                    });
                } catch (error) {
                    console.error("Gagal simpan ke database:", error);
                }
            }, 1000); 
        }

        function perbaruiTampilan() {
            const tbody = document.getElementById("tabelPiket");
            tbody.innerHTML = ""; 

            daftarPiket.forEach((nama, index) => {
                let tugasTeks = daftarTugas[index] || "";

                const baris = `
                <div class="flex-row">
                    <div class="flex-cell">
                        <div class="label-piket"><strong>Piket ${index + 1}</strong></div>
                        <textarea class="input-tugas" oninput="simpanTugas(${index}, this.value)" placeholder="Ketik rincian tugas...">${tugasTeks}</textarea>
                    </div>
                    <div class="flex-cell">
                        <div class="label-piket" style="visibility: hidden;"><strong>Piket ${index + 1}</strong></div>
                        <textarea class="input-nama" oninput="simpanNama(${index}, this.value)" placeholder="Ketik nama marbot...">${nama}</textarea>
                    </div>
                </div>`;
                tbody.innerHTML += baris;
            });
            
            document.getElementById("pilihJumlah").value = daftarPiket.length;
        }

        function simpanNama(index, nilaiBaru) { 
            daftarPiket[index] = nilaiBaru; 
            simpanKeDatabase(); 
        }
        function simpanTugas(index, nilaiBaru) { 
            daftarTugas[index] = nilaiBaru; 
            simpanKeDatabase();
        }

        function sesuaikanJumlah() {
            const targetJumlah = parseInt(document.getElementById("pilihJumlah").value);
            while (daftarPiket.length < targetJumlah) { 
                daftarPiket.unshift(""); 
                if (daftarTugas.length < targetJumlah) { daftarTugas.push(""); }
            }
            while (daftarPiket.length > targetJumlah) { daftarPiket.pop(); }
            
            perbaruiTampilan();
            simpanKeDatabase();
        }

        function putarGiliran() {
            if (daftarPiket.length > 0) {
                const orangTerakhir = daftarPiket.pop();
                daftarPiket.unshift(orangTerakhir);
                
                perbaruiTampilan();
                simpanKeDatabase();
            }
        }

        function formatTugasCetak(teks) {
            if (!teks || teks.trim() === "") return "-";
            const barisTeks = teks.split('\n').filter(b => b.trim() !== '');
            if (barisTeks.length === 1) return barisTeks[0];
            return "<ul>" + barisTeks.map(b => `<li>${b}</li>`).join('') + "</ul>";
        }

        function formatNamaCetak(nama) {
            if (!nama || nama.trim() === "") return "-";
            return nama.replace(/\n/g, "<br>");
        }

        function siapkanTampilanCetak() {
            const tbody = document.getElementById("tabelPiket");
            tbody.innerHTML = ""; 

            daftarPiket.forEach((nama, index) => {
                const namaTampil = formatNamaCetak(nama);
                const tugasTampil = formatTugasCetak(daftarTugas[index] || "");
                
                const baris = `
                <div class="flex-row">
                    <div class="flex-cell">
                        <div class="label-piket"><strong>Piket ${index + 1}</strong></div>
                        <div class="tugas-teks">${tugasTampil}</div>
                    </div>
                    <div class="flex-cell" style="justify-content: center; align-items: center;">
                        <span class="nama-teks">${namaTampil}</span>
                    </div>
                </div>`;
                tbody.innerHTML += baris;
            });
        }

        async function bagikanKeWA() {
            siapkanTampilanCetak();
            document.getElementById("areaMenu").style.display = "none";
            document.getElementById("areaTombol").style.display = "none";
            
            const tgl = document.getElementById("tanggalCetak");
            tgl.innerText = "Diperbarui: " + new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            tgl.style.display = "block";

            const areaCetak = document.getElementById("areaCetak");

            try {
                const canvas = await html2canvas(areaCetak, { scale: 2 }); 

                perbaruiTampilan();
                document.getElementById("areaMenu").style.display = "flex";
                document.getElementById("areaTombol").style.display = "flex";
                tgl.style.display = "none";

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], "Jadwal_Marbot.png", { type: "image/png" });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ title: 'Jadwal Marbot', text: 'Jadwal piket terbaru:', files: [file] }); } 
                        catch (error) { console.log('Batal', error); }
                    } else {
                        const link = document.createElement('a');
                        link.download = 'Jadwal_Marbot.png'; link.href = canvas.toDataURL("image/png"); link.click();
                        alert("Gambar berhasil diunduh!");
                    }
                });
            } catch (err) {
                console.error("Gagal memotret:", err);
                perbaruiTampilan();
                document.getElementById("areaMenu").style.display = "flex"; document.getElementById("areaTombol").style.display = "flex"; tgl.style.display = "none";
            }
        }

        // Panggil fungsi koneksi ke Database saat pertama kali dibuka
        ambilDataDariDatabase();
    </script>
</body>
</html>
